<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Checklist OCA - Climacontrol</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F8FFFE;min-height:100vh;padding-bottom:80px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.header{background:linear-gradient(135deg,#0D8A74,#10A890);color:#fff;padding:14px 16px 18px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.header-brand{font-size:10px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.header-title{font-size:15px;font-weight:700}
.header-badges{display:flex;gap:6px;margin-top:4px}
.badge{font-size:9px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px}
.btn-refresh{font-size:9px;background:rgba(255,255,255,.25);padding:2px 10px;border-radius:10px;border:none;color:#fff;font-weight:600;cursor:pointer}
.header-pct{font-size:28px;font-weight:800;line-height:1;text-align:right}
.header-sub{font-size:10px;opacity:.8;text-align:right}
.progress-bar{background:rgba(255,255,255,.2);border-radius:6px;height:8px;overflow:hidden;margin-top:8px}
.progress-fill{background:#fff;height:100%;border-radius:6px;transition:width .5s ease}
.stats{display:flex;gap:8px;margin-top:8px}
.stat-box{flex:1;background:rgba(255,255,255,.12);border-radius:6px;padding:3px 0;text-align:center}
.stat-label{font-size:9px;opacity:.7}
.stat-val{font-size:13px;font-weight:700}
.filters{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#fff;border-bottom:1px solid #E5E7EB}
.filter-btn{padding:5px 12px;border-radius:20px;border:none;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;background:#F3F4F6;color:#6B7280}
.filter-btn.active{background:#10A890;color:#fff}
.items{padding:8px 12px}
.cat-header{background:#0D8A74;color:#fff;padding:8px 12px;border-radius:8px;margin:12px 0 6px;font-weight:700;font-size:13px}
.item{background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s;animation:fadeIn .3s ease}
.item.done{background:#F0FDF4;border:1.5px solid #86EFAC}
.item.expanded{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.item-main{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.checkbox{width:28px;height:28px;min-width:28px;border-radius:8px;border:2px solid #D1D5DB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.checkbox.checked{border-color:#4CAF4F;background:#4CAF4F}
.checkbox.ok{border:none;background:#DBEAFE}
.check-mark{color:#fff;font-size:16px;font-weight:800}
.item-content{flex:1;min-width:0}
.item-tags{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.item-num{font-size:11px;color:#9CA3AF;font-weight:600}
.prio-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;color:#fff}
.prio-ALTA{background:#EF4444}.prio-MEDIA{background:#F59E0B}.prio-BAJA{background:#10B981}.prio-OK{background:#0EA5E9}
.photo-count{font-size:11px}
.item-ubic{font-size:12px;font-weight:600;color:#374151;line-height:1.3}
.item-desc{font-size:11px;color:#6B7280;line-height:1.3}
.item-desc.strikethrough{text-decoration:line-through;color:#9CA3AF}
.item-done-date{font-size:10px;color:#4CAF4F;margin-top:2px}
.arrow{font-size:14px;color:#9CA3AF;transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(180deg)}
.detail{padding:0 12px 12px;border-top:1px solid #F3F4F6}
.detail-buttons{display:flex;gap:8px;margin-top:10px}
.btn-photo{flex:1;padding:10px 0;border-radius:8px;font-size:13px;font-weight:600;text-align:center;background:linear-gradient(135deg,#10A890,#0D8A74);color:#fff;cursor:pointer;display:block;border:none;font-family:inherit}
.btn-toggle{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-toggle.mark{background:#D1FAE5;color:#065F46}
.btn-toggle.unmark{background:#FEE2E2;color:#B91C1C}
.note-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;outline:none;margin-top:8px;font-family:inherit}
.photos-section{margin-top:10px}
.photos-title{font-size:11px;font-weight:600;color:#6B7280;margin-bottom:6px}
.photos-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.photo-thumb{position:relative;min-width:80px}
.photo-thumb img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #E5E7EB;cursor:pointer}
.photo-delete{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#EF4444;color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-date{font-size:9px;color:#9CA3AF;text-align:center;margin-top:2px}
.bottom{padding:20px 12px;display:flex;flex-direction:column;gap:10px;align-items:center}
.btn-big{width:100%;max-width:320px;padding:14px 0;border-radius:10px;border:none;font-size:14px;font-weight:700;background:linear-gradient(135deg,#10A890,#0D8A74);color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(16,168,144,.3)}
.btn-reset{padding:8px 20px;border-radius:8px;border:1px solid #FCA5A5;background:#fff;color:#B91C1C;font-size:12px;cursor:pointer}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:300;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideIn .3s ease;color:#fff;display:none}
.toast.ok{background:#065F46}.toast.error{background:#991B1B}
.toast.show{display:block}
.viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;cursor:pointer}
.viewer.show{display:flex}
.viewer img{max-width:100%;max-height:80vh;border-radius:8px}
.viewer-date{color:#fff;margin-top:8px;font-size:12px}
.viewer-hint{color:rgba(255,255,255,.5);margin-top:4px;font-size:11px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-dot.online{background:#4ADE80}.sync-dot.offline{background:#F87171}
</style>

var state = {};
var photos = {};
var currentFilter = "ALL";
var expandedId = null;
var pendingPhotoId = null;
var toastTimer = null;

function showToast(msg, ok) {
  var t = document.getElementById("toast");
  t.textContent = (ok ? "✓ " : "✕ ") + msg;
  t.className = "toast show " + (ok ? "ok" : "error");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = "toast"; }, 2500);
}

function setSyncStatus(online) {
  var dot = document.getElementById("syncDot");
  dot.className = "sync-dot " + (online ? "online" : "offline");
}

// Firebase REST API
function fbSave(path, data, cb) {
  fetch(FB_URL + "/" + path + ".json", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).then(function(r){ return r.json(); }).then(function(d){
    setSyncStatus(true);
    if (cb) cb(true);
  }).catch(function(e){
    setSyncStatus(false);
    if (cb) cb(false);
  });
}

function fbLoad(path, cb) {
  fetch(FB_URL + "/" + path + ".json")
    .then(function(r){ return r.json(); })
    .then(function(d){ setSyncStatus(true); cb(d); })
    .catch(function(e){ setSyncStatus(false); cb(null); });
}

function saveState() {
  fbSave("state", state, function(ok){
    if (!ok) showToast("Error al sincronizar", false);
  });
}

function savePhotos() {
  fbSave("photos", photos, function(ok){
    if (!ok) showToast("Error al guardar foto", false);
  });
}

function loadFromFirebase() {
  showToast("Actualizando...", true);
  fbLoad("state", function(d){
    if (d) state = d;
    fbLoad("photos", function(p){
      if (p) photos = p;
      showToast("Actualizado", true);
      render();
    });
  });
}

function resizeImage(file, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement("canvas");
      var ratio = Math.min(600/img.width, 600/img.height, 1);
      c.width = img.width * ratio; c.height = img.height * ratio;
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      cb(c.toDataURL("image/jpeg", 0.4));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function toggle(id, ev) {
  if (ev) ev.stopPropagation();
  if (!state[id]) state[id] = {};
  state[id].done = !state[id].done;
  state[id].doneAt = state[id].done ? new Date().toLocaleString("es-ES") : null;
  saveState();
  showToast(state[id].done ? "Marcado" : "Desmarcado", true);
  render();
}

function setNote(id, val) {
  if (!state[id]) state[id] = {};
  state[id].note = val;
  saveState();
}

function takePhoto(id) {
  pendingPhotoId = id;
  var input = document.getElementById("fileInput");
  input.value = "";
  input.click();
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("fileInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file || !pendingPhotoId) return;
    var id = pendingPhotoId;
    resizeImage(file, function(data) {
      if (!photos[id]) photos[id] = [];
      photos[id].push({ data: data, date: new Date().toLocaleString("es-ES") });
      savePhotos();
      showToast("Foto guardada", true);
      render();
    });
    e.target.value = "";
    pendingPhotoId = null;
  });
  // Initial load
  loadFromFirebase();
});

function rmPhoto(id, idx) {
  if (!photos[id]) return;
  photos[id].splice(idx, 1);
  if (photos[id].length === 0) delete photos[id];
  savePhotos();
  render();
}

function openViewer(itemId, idx) {
  var ph = photos[itemId][idx];
  var v = document.getElementById("viewer");
  document.getElementById("viewer-img").src = ph.data;
  document.getElementById("viewer-date").textContent = ph.date;
  v.className = "viewer show";
}
function closeViewer() { document.getElementById("viewer").className = "viewer"; }

function setFilter(f) { currentFilter = f; render(); }

function toggleExpand(id) {
  expandedId = (expandedId === id) ? null : id;
  render();
}

function resetAll() {
  if (confirm("Borrar TODO el progreso de TODOS? No se puede deshacer.")) {
    state = {}; photos = {};
    fbSave("state", {});
    fbSave("photos", {});
    showToast("Todo reiniciado", true);
    render();
  }
}

function gs(id) { return state[id] || {}; }

function render() {
  var defs = ITEMS.filter(function(i){ return i.p !== "OK"; });
  var dn = defs.filter(function(i){ return gs(i.id).done; }).length;
  var tot = defs.length;
  var pct = tot > 0 ? Math.round(dn/tot*100) : 0;
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("pct-sub").textContent = dn + "/" + tot;
  document.getElementById("progress").style.width = pct + "%";

  var aT=0,aD=0,mT=0,mD=0,bT=0,bD=0;
  defs.forEach(function(i){
    if(i.p==="ALTA"){aT++;if(gs(i.id).done)aD++;}
    if(i.p==="MEDIA"){mT++;if(gs(i.id).done)mD++;}
    if(i.p==="BAJA"){bT++;if(gs(i.id).done)bD++;}
  });
  document.getElementById("stat-alta").innerHTML='<span style="color:#FCA5A5">'+aD+'</span>/'+aT;
  document.getElementById("stat-media").innerHTML='<span style="color:#FCD34D">'+mD+'</span>/'+mT;
  document.getElementById("stat-baja").innerHTML='<span style="color:#6EE7B7">'+bD+'</span>/'+bT;

  var filts=[{k:"ALL",l:"Todos"},{k:"PEND",l:"Pendientes"},{k:"DONE",l:"Hechos"},{k:"ALTA",l:"Alta"},{k:"MEDIA",l:"Media"},{k:"BAJA",l:"Baja"},{k:"FOTO",l:"Con foto"}];
  document.getElementById("filters").innerHTML=filts.map(function(f){
    return '<button class="filter-btn'+(currentFilter===f.k?' active':'')+'" onclick="setFilter(\''+f.k+'\')">'+f.l+'</button>';
  }).join("");

  var filtered=ITEMS.filter(function(i){
    var s=gs(i.id);var ph=photos[i.id]||[];
    if(currentFilter==="ALL")return true;
    if(currentFilter==="PEND")return i.p!=="OK"&&!s.done;
    if(currentFilter==="DONE")return s.done;
    if(currentFilter==="FOTO")return ph.length>0;
    return i.p===currentFilter;
  });

  var html="";
  filtered.forEach(function(item){
    var s=gs(item.id);var isDone=s.done;var isOK=item.p==="OK";
    var isExp=expandedId===item.id;var itemPhotos=photos[item.id]||[];

    if(item.cat) html+='<div class="cat-header">'+item.cat+'</div>';
    html+='<div class="item'+(isDone?' done':'')+(isExp?' expanded':'')+'">';
    html+='<div class="item-main" onclick="toggleExpand('+item.id+')">';

    if(!isOK){
      html+='<div class="checkbox'+(isDone?' checked':'')+'" onclick="toggle('+item.id+',event)">';
      if(isDone) html+='<span class="check-mark">✓</span>';
      html+='</div>';
    } else {
      html+='<div class="checkbox ok"><span style="font-size:14px">✓</span></div>';
    }

    html+='<div class="item-content"><div class="item-tags">';
    html+='<span class="item-num">#'+item.id+'</span>';
    html+='<span class="prio-badge prio-'+item.p+'">'+item.p+'</span>';
    if(itemPhotos.length>0) html+='<span class="photo-count">📷'+itemPhotos.length+'</span>';
    html+='</div>';
    html+='<div class="item-ubic">'+item.u+'</div>';
    html+='<div class="item-desc'+(isDone?' strikethrough':'')+'">'+item.d+'</div>';
    if(isDone&&s.doneAt) html+='<div class="item-done-date">Hecho: '+s.doneAt+'</div>';
    html+='</div>';
    html+='<div class="arrow'+(isExp?' open':'')+'">▼</div></div>';

    if(isExp){
      html+='<div class="detail">';
      if(!isOK){
        html+='<div class="detail-buttons">';
        html+='<button class="btn-photo" onclick="event.stopPropagation();takePhoto('+item.id+')">📷 Foto</button>';
        html+='<button class="btn-toggle '+(isDone?'unmark':'mark')+'" onclick="toggle('+item.id+')">'+(isDone?'✗ Desmarcar':'✓ Hecho')+'</button>';
        html+='</div>';
        html+='<input class="note-input" type="text" placeholder="Añadir nota..." value="'+(s.note||'').replace(/"/g,'&quot;')+'" onchange="setNote('+item.id+',this.value)">';
      }
      if(itemPhotos.length>0){
        html+='<div class="photos-section"><div class="photos-title">Fotos ('+itemPhotos.length+'):</div><div class="photos-row">';
        itemPhotos.forEach(function(ph,idx){
          html+='<div class="photo-thumb">';
          html+='<img src="'+ph.data+'" onclick="event.stopPropagation();openViewer('+item.id+','+idx+')">';
          html+='<button class="photo-delete" onclick="event.stopPropagation();rmPhoto('+item.id+','+idx+')">✕</button>';
          html+='<div class="photo-date">'+ph.date+'</div></div>';
        });
        html+='</div></div>';
      }
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById("items").innerHTML=html;
}

// Auto-refresh every 30 seconds
setInterval(loadFromFirebase, 30000);
</script>
</body>
</html>
