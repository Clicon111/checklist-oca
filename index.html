<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Checklist OCA - Climacontrol</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F8FFFE;min-height:100vh;padding-bottom:80px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.header{background:linear-gradient(135deg,#0D8A74,#10A890);color:#fff;padding:14px 16px 18px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.header-brand{font-size:10px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.header-title{font-size:15px;font-weight:700}
.header-badges{display:flex;gap:6px;margin-top:4px}
.badge{font-size:9px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px}
.btn-refresh{font-size:9px;background:rgba(255,255,255,.25);padding:2px 10px;border-radius:10px;border:none;color:#fff;font-weight:600;cursor:pointer}
.header-pct{font-size:28px;font-weight:800;line-height:1;text-align:right}
.header-sub{font-size:10px;opacity:.8;text-align:right}
.progress-bar{background:rgba(255,255,255,.2);border-radius:6px;height:8px;overflow:hidden;margin-top:8px}
.progress-fill{background:#fff;height:100%;border-radius:6px;transition:width .5s ease}
.stats{display:flex;gap:8px;margin-top:8px}
.stat-box{flex:1;background:rgba(255,255,255,.12);border-radius:6px;padding:3px 0;text-align:center}
.stat-label{font-size:9px;opacity:.7}
.stat-val{font-size:13px;font-weight:700}
.filters{padding:8px 12px;background:#fff;border-bottom:1px solid #E5E7EB}
.filter-btn{padding:5px 12px;border-radius:20px;border:none;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;background:#F3F4F6;color:#6B7280}
.filter-btn.active{background:#10A890;color:#fff}
.items{padding:8px 12px}
.cat-header{background:#0D8A74;color:#fff;padding:8px 12px;border-radius:8px;margin:12px 0 6px;font-weight:700;font-size:13px}
.item{background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s;animation:fadeIn .3s ease}
.item.done{background:#F0FDF4;border:1.5px solid #86EFAC}
.item.expanded{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.item-main{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.checkbox{width:28px;height:28px;min-width:28px;border-radius:8px;border:2px solid #D1D5DB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.checkbox.checked{border-color:#4CAF4F;background:#4CAF4F}
.checkbox.ok{border:none;background:#DBEAFE}
.check-mark{color:#fff;font-size:16px;font-weight:800}
.item-content{flex:1;min-width:0}
.item-tags{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.item-num{font-size:11px;color:#9CA3AF;font-weight:600}
.prio-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;color:#fff}
.prio-ALTA{background:#EF4444}.prio-MEDIA{background:#F59E0B}.prio-BAJA{background:#10B981}.prio-OK{background:#0EA5E9}
.photo-count{font-size:11px}
.item-ubic{font-size:12px;font-weight:600;color:#374151;line-height:1.3}
.item-desc{font-size:11px;color:#6B7280;line-height:1.3}
.item-desc.strikethrough{text-decoration:line-through;color:#9CA3AF}
.item-done-date{font-size:10px;color:#4CAF4F;margin-top:2px}
.arrow{font-size:14px;color:#9CA3AF;transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(180deg)}
.detail{padding:0 12px 12px;border-top:1px solid #F3F4F6}
.detail-buttons{display:flex;gap:8px;margin-top:10px}
.btn-photo{flex:1;padding:10px 0;border-radius:8px;font-size:13px;font-weight:600;text-align:center;background:linear-gradient(135deg,#10A890,#0D8A74);color:#fff;cursor:pointer;display:block;border:none;font-family:inherit}
.btn-toggle{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-toggle.mark{background:#D1FAE5;color:#065F46}
.btn-toggle.unmark{background:#FEE2E2;color:#B91C1C}
.note-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:12px;outline:none;margin-top:8px;font-family:inherit}
.photos-section{margin-top:10px}
.photos-title{font-size:11px;font-weight:600;color:#6B7280;margin-bottom:6px}
.photos-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.photo-thumb{position:relative;min-width:80px}
.photo-thumb img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #E5E7EB;cursor:pointer}
.photo-delete{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#EF4444;color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-date{font-size:9px;color:#9CA3AF;text-align:center;margin-top:2px}
.bottom{padding:20px 12px;display:flex;flex-direction:column;gap:10px;align-items:center}
.btn-big{width:100%;max-width:320px;padding:14px 0;border-radius:10px;border:none;font-size:14px;font-weight:700;background:linear-gradient(135deg,#10A890,#0D8A74);color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(16,168,144,.3)}
.btn-reset{padding:8px 20px;border-radius:8px;border:1px solid #FCA5A5;background:#fff;color:#B91C1C;font-size:12px;cursor:pointer}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:300;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideIn .3s ease;color:#fff;display:none}
.toast.ok{background:#065F46}.toast.error{background:#991B1B}
.toast.show{display:block}
.viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;cursor:pointer}
.viewer.show{display:flex}
.viewer img{max-width:100%;max-height:80vh;border-radius:8px}
.viewer-date{color:#fff;margin-top:8px;font-size:12px}
.viewer-hint{color:rgba(255,255,255,.5);margin-top:4px;font-size:11px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-dot.online{background:#4ADE80}.sync-dot.offline{background:#F87171}
</style>

var state = {};
var photos = {};
var currentFilter = "ALL";
var currentZone = "ALL";
var expandedId = null;
var pendingPhotoId = null;
var toastTimer = null;

function showToast(msg, ok) {
  var t = document.getElementById("toast");
  t.textContent = (ok ? "✓ " : "✕ ") + msg;
  t.className = "toast show " + (ok ? "ok" : "error");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = "toast"; }, 2500);
}

function setSyncStatus(online) {
  var dot = document.getElementById("syncDot");
  dot.className = "sync-dot " + (online ? "online" : "offline");
}

// Firebase REST API
function fbSave(path, data, cb) {
  fetch(FB_URL + "/" + path + ".json", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).then(function(r){ return r.json(); }).then(function(d){
    setSyncStatus(true);
    if (cb) cb(true);
  }).catch(function(e){
    setSyncStatus(false);
    if (cb) cb(false);
  });
}

function fbLoad(path, cb) {
  fetch(FB_URL + "/" + path + ".json")
    .then(function(r){ return r.json(); })
    .then(function(d){ setSyncStatus(true); cb(d); })
    .catch(function(e){ setSyncStatus(false); cb(null); });
}

function saveState() {
  fbSave("state", state, function(ok){
    if (!ok) showToast("Error al sincronizar", false);
  });
}

function savePhotos() {
  fbSave("photos", photos, function(ok){
    if (!ok) showToast("Error al guardar foto", false);
  });
}

function loadFromFirebase() {
  showToast("Actualizando...", true);
  fbLoad("state", function(d){
    if (d) state = d;
    fbLoad("photos", function(p){
      if (p) photos = p;
      showToast("Actualizado", true);
      render();
    });
  });
}

function resizeImage(file, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement("canvas");
      var ratio = Math.min(600/img.width, 600/img.height, 1);
      c.width = img.width * ratio; c.height = img.height * ratio;
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      cb(c.toDataURL("image/jpeg", 0.4));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function toggle(id, ev) {
  if (ev) ev.stopPropagation();
  if (!state[id]) state[id] = {};
  state[id].done = !state[id].done;
  state[id].doneAt = state[id].done ? new Date().toLocaleString("es-ES") : null;
  saveState();
  showToast(state[id].done ? "Marcado" : "Desmarcado", true);
  render();
}

function setNote(id, val) {
  if (!state[id]) state[id] = {};
  state[id].note = val;
  saveState();
}

function takePhoto(id) {
  pendingPhotoId = id;
  var input = document.getElementById("fileInput");
  input.value = "";
  input.click();
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("fileInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file || !pendingPhotoId) return;
    var id = pendingPhotoId;
    resizeImage(file, function(data) {
      if (!photos[id]) photos[id] = [];
      photos[id].push({ data: data, date: new Date().toLocaleString("es-ES") });
      savePhotos();
      showToast("Foto guardada", true);
      render();
    });
    e.target.value = "";
    pendingPhotoId = null;
  });
  // Initial load
  loadFromFirebase();
});

function rmPhoto(id, idx) {
  if (!photos[id]) return;
  photos[id].splice(idx, 1);
  if (photos[id].length === 0) delete photos[id];
  savePhotos();
  render();
}

function openViewer(itemId, idx) {
  var ph = photos[itemId][idx];
  var v = document.getElementById("viewer");
  document.getElementById("viewer-img").src = ph.data;
  document.getElementById("viewer-date").textContent = ph.date;
  v.className = "viewer show";
}
function closeViewer() { document.getElementById("viewer").className = "viewer"; }

function setFilter(f) { currentFilter = f; render(); }
function setZone(z) { currentZone = z; render(); }

function toggleExpand(id) {
  expandedId = (expandedId === id) ? null : id;
  render();
}

function resetAll() {
  if (confirm("Borrar TODO el progreso de TODOS? No se puede deshacer.")) {
    state = {}; photos = {};
    fbSave("state", {});
    fbSave("photos", {});
    showToast("Todo reiniciado", true);
    render();
  }
}

function gs(id) { return state[id] || {}; }

function render() {
  var defs = ITEMS.filter(function(i){ return i.p !== "OK"; });
  var dn = defs.filter(function(i){ return gs(i.id).done; }).length;
  var tot = defs.length;
  var pct = tot > 0 ? Math.round(dn/tot*100) : 0;
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("pct-sub").textContent = dn + "/" + tot;
  document.getElementById("progress").style.width = pct + "%";

  var aT=0,aD=0,mT=0,mD=0,bT=0,bD=0;
  defs.forEach(function(i){
    if(i.p==="ALTA"){aT++;if(gs(i.id).done)aD++;}
    if(i.p==="MEDIA"){mT++;if(gs(i.id).done)mD++;}
    if(i.p==="BAJA"){bT++;if(gs(i.id).done)bD++;}
  });
  document.getElementById("stat-alta").innerHTML='<span style="color:#FCA5A5">'+aD+'</span>/'+aT;
  document.getElementById("stat-media").innerHTML='<span style="color:#FCD34D">'+mD+'</span>/'+mT;
  document.getElementById("stat-baja").innerHTML='<span style="color:#6EE7B7">'+bD+'</span>/'+bT;

  var filts=[{k:"ALL",l:"Todos"},{k:"PEND",l:"Pendientes"},{k:"DONE",l:"Hechos"},{k:"ALTA",l:"Alta"},{k:"MEDIA",l:"Media"},{k:"BAJA",l:"Baja"},{k:"FOTO",l:"Con foto"}];
  var filtHtml=filts.map(function(f){
    return '<button class="filter-btn'+(currentFilter===f.k?' active':'')+'" onclick="setFilter(\''+f.k+'\')">'+f.l+'</button>';
  }).join("");

  // Zone filter - extract unique zones, simplify names
  var zoneMap={};
  ITEMS.forEach(function(i){
    var z=i.u.replace(/\s*\(.*\)/,"").trim(); // Remove (M2 N2) etc
    if(!zoneMap[z])zoneMap[z]=i.u;
  });
  var zones=Object.keys(zoneMap).sort();
  var zoneHtml='<button class="filter-btn'+(currentZone==="ALL"?' active':'')+'" onclick="setZone(\'ALL\')">Todas</button>';
  zones.forEach(function(z){
    // Count pending in this zone
    var zItems=ITEMS.filter(function(i){return i.u.replace(/\s*\(.*\)/,"").trim()===z});
    var zPend=zItems.filter(function(i){return i.p!=="OK"&&!gs(i.id).done}).length;
    var badge=zPend>0?' <span style="background:#EF4444;color:#fff;border-radius:8px;padding:0 5px;font-size:9px">'+zPend+'</span>':"";
    zoneHtml+='<button class="filter-btn'+(currentZone===z?' active':'')+'" onclick="setZone(\''+z.replace(/'/g,"\\'")+'\')">'+z+badge+'</button>';
  });

  document.getElementById("filters").innerHTML=
    '<div style="margin-bottom:4px;font-size:9px;color:#9CA3AF;font-weight:600;padding-left:2px">ESTADO</div>'+
    '<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px">'+filtHtml+'</div>'+
    '<div style="margin-top:2px;margin-bottom:2px;font-size:9px;color:#9CA3AF;font-weight:600;padding-left:2px">ZONA</div>'+
    '<div style="display:flex;gap:6px;overflow-x:auto">'+zoneHtml+'</div>';

  var filtered=ITEMS.filter(function(i){
    var s=gs(i.id);var ph=photos[i.id]||[];
    // Zone filter
    if(currentZone!=="ALL"){
      var iz=i.u.replace(/\s*\(.*\)/,"").trim();
      if(iz!==currentZone) return false;
    }
    // Status filter
    if(currentFilter==="ALL")return true;
    if(currentFilter==="PEND")return i.p!=="OK"&&!s.done;
    if(currentFilter==="DONE")return s.done;
    if(currentFilter==="FOTO")return ph.length>0;
    return i.p===currentFilter;
  });

  var html="";
  filtered.forEach(function(item){
    var s=gs(item.id);var isDone=s.done;var isOK=item.p==="OK";
    var isExp=expandedId===item.id;var itemPhotos=photos[item.id]||[];

    if(item.cat) html+='<div class="cat-header">'+item.cat+'</div>';
    html+='<div class="item'+(isDone?' done':'')+(isExp?' expanded':'')+'">';
    html+='<div class="item-main" onclick="toggleExpand('+item.id+')">';

    if(!isOK){
      html+='<div class="checkbox'+(isDone?' checked':'')+'" onclick="toggle('+item.id+',event)">';
      if(isDone) html+='<span class="check-mark">✓</span>';
      html+='</div>';
    } else {
      html+='<div class="checkbox ok"><span style="font-size:14px">✓</span></div>';
    }

    html+='<div class="item-content"><div class="item-tags">';
    html+='<span class="item-num">#'+item.id+'</span>';
    html+='<span class="prio-badge prio-'+item.p+'">'+item.p+'</span>';
    if(itemPhotos.length>0) html+='<span class="photo-count">📷'+itemPhotos.length+'</span>';
    html+='</div>';
    html+='<div class="item-ubic">'+item.u+'</div>';
    html+='<div class="item-desc'+(isDone?' strikethrough':'')+'">'+item.d+'</div>';
    if(isDone&&s.doneAt) html+='<div class="item-done-date">Hecho: '+s.doneAt+'</div>';
    html+='</div>';
    html+='<div class="arrow'+(isExp?' open':'')+'">▼</div></div>';

    if(isExp){
      html+='<div class="detail">';
      if(!isOK){
        html+='<div class="detail-buttons">';
        html+='<button class="btn-photo" onclick="event.stopPropagation();takePhoto('+item.id+')">📷 Foto</button>';
        html+='<button class="btn-toggle '+(isDone?'unmark':'mark')+'" onclick="toggle('+item.id+')">'+(isDone?'✗ Desmarcar':'✓ Hecho')+'</button>';
        html+='</div>';
        html+='<input class="note-input" type="text" placeholder="Añadir nota..." value="'+(s.note||'').replace(/"/g,'&quot;')+'" onchange="setNote('+item.id+',this.value)">';
      }
      if(itemPhotos.length>0){
        html+='<div class="photos-section"><div class="photos-title">Fotos ('+itemPhotos.length+'):</div><div class="photos-row">';
        itemPhotos.forEach(function(ph,idx){
          html+='<div class="photo-thumb">';
          html+='<img src="'+ph.data+'" onclick="event.stopPropagation();openViewer('+item.id+','+idx+')">';
          html+='<button class="photo-delete" onclick="event.stopPropagation();rmPhoto('+item.id+','+idx+')">✕</button>';
          html+='<div class="photo-date">'+ph.date+'</div></div>';
        });
        html+='</div></div>';
      }
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById("items").innerHTML=html;
}

function generateReport() {
  var now = new Date().toLocaleString("es-ES");
  var defs = ITEMS.filter(function(i){return i.p!=="OK"});
  var dn = defs.filter(function(i){return gs(i.id).done}).length;
  var tot = defs.length;
  var pend = tot - dn;
  var pct = tot>0?Math.round(dn/tot*100):0;
  var aT=0,aD=0,mT=0,mD=0,bT=0,bD=0;
  defs.forEach(function(i){
    if(i.p==="ALTA"){aT++;if(gs(i.id).done)aD++;}
    if(i.p==="MEDIA"){mT++;if(gs(i.id).done)mD++;}
    if(i.p==="BAJA"){bT++;if(gs(i.id).done)bD++;}
  });
  var totalPhotos=0;
  ITEMS.forEach(function(i){var p=photos[i.id]||[];totalPhotos+=p.length;});

  // Group by location
  var locs={};
  defs.forEach(function(i){
    var loc=i.u;if(!locs[loc])locs[loc]={total:0,done:0};
    locs[loc].total++;if(gs(i.id).done)locs[loc].done++;
  });

  // SVG donut chart
  function donut(done,total,color,label){
    var pct=total>0?Math.round(done/total*100):0;
    var r=45,c=2*Math.PI*r;
    var dash=c*pct/100;
    return '<div style="text-align:center;flex:1;min-width:120px">'+
      '<svg viewBox="0 0 120 120" width="120" height="120">'+
      '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#E5E7EB" stroke-width="10"/>'+
      '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="10" '+
      'stroke-dasharray="'+dash+' '+c+'" stroke-linecap="round" transform="rotate(-90 60 60)"/>'+
      '<text x="60" y="55" text-anchor="middle" font-size="22" font-weight="800" fill="'+color+'">'+pct+'%</text>'+
      '<text x="60" y="72" text-anchor="middle" font-size="10" fill="#6B7280">'+done+'/'+total+'</text>'+
      '</svg><div style="font-size:11px;font-weight:600;color:#374151;margin-top:4px">'+label+'</div></div>';
  }

  // SVG bar chart
  function bar(items){
    var maxVal=0;
    items.forEach(function(b){if(b.total>maxVal)maxVal=b.total;});
    var bw=40,gap=15,h=150;
    var w=(bw*2+gap)*items.length+40;
    var svg='<svg viewBox="0 0 '+w+' '+(h+40)+'" width="100%" height="'+(h+50)+'" style="max-width:500px">';
    items.forEach(function(b,i){
      var x=20+(bw*2+gap)*i;
      var hT=maxVal>0?b.total/maxVal*h:0;
      var hD=maxVal>0?b.done/maxVal*h:0;
      svg+='<rect x="'+x+'" y="'+(h-hT)+'" width="'+bw+'" height="'+hT+'" rx="4" fill="#E5E7EB"/>';
      svg+='<rect x="'+(x+bw)+'" y="'+(h-hD)+'" width="'+bw+'" height="'+hD+'" rx="4" fill="'+b.color+'"/>';
      svg+='<text x="'+(x+bw)+'" y="'+(h+15)+'" text-anchor="middle" font-size="10" fill="#374151">'+b.label+'</text>';
      svg+='<text x="'+(x+bw/2)+'" y="'+(h-hT-5)+'" text-anchor="middle" font-size="9" fill="#9CA3AF">'+b.total+'</text>';
      svg+='<text x="'+(x+bw*1.5)+'" y="'+(h-hD-5)+'" text-anchor="middle" font-size="9" fill="'+b.color+'">'+b.done+'</text>';
    });
    svg+='</svg>';
    svg+='<div style="font-size:10px;color:#9CA3AF;text-align:center;margin-top:4px">';
    svg+='<span style="display:inline-block;width:12px;height:12px;background:#E5E7EB;border-radius:2px;vertical-align:middle;margin-right:3px"></span>Total ';
    svg+='<span style="display:inline-block;width:12px;height:12px;background:#10A890;border-radius:2px;vertical-align:middle;margin:0 3px 0 10px"></span>Completado</div>';
    return svg;
  }

  // Items table
  var rows="";
  ITEMS.forEach(function(item){
    var s=gs(item.id);var isDone=s.done;var isOK=item.p==="OK";
    var itemPhotos=photos[item.id]||[];
    var status=isOK?"OK":isDone?"REALIZADO":"PENDIENTE";
    var statusColor=isOK?"#0EA5E9":isDone?"#10B981":"#EF4444";
    var prioBg=item.p==="ALTA"?"#FDE8E8":item.p==="MEDIA"?"#FEF3C7":item.p==="BAJA"?"#D1FAE5":"#E0F2FE";

    if(item.cat) rows+='<tr><td colspan="5" style="background:#0D8A74;color:#fff;font-weight:700;padding:8px 10px;font-size:12px">'+item.cat+'</td></tr>';

    var photoHtml="";
    if(itemPhotos.length>0){
      photoHtml='<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">';
      itemPhotos.forEach(function(ph){
        photoHtml+='<div style="text-align:center"><img src="'+ph.data+'" style="width:80px;height:80px;object-fit:cover;border-radius:4px;border:1px solid #ddd"><div style="font-size:8px;color:#999">'+ph.date+'</div></div>';
      });
      photoHtml+='</div>';
    }

    var noteHtml=s.note?'<div style="font-size:10px;color:#6B7280;font-style:italic;margin-top:3px">Nota: '+s.note+'</div>':"";

    rows+='<tr>';
    rows+='<td style="border:1px solid #E5E7EB;padding:5px;text-align:center;font-size:11px;width:30px">'+item.id+'</td>';
    rows+='<td style="border:1px solid #E5E7EB;padding:5px;font-size:11px;font-weight:600">'+item.u+'</td>';
    rows+='<td style="border:1px solid #E5E7EB;padding:5px;font-size:10px">'+item.d+noteHtml+photoHtml+'</td>';
    rows+='<td style="border:1px solid #E5E7EB;padding:5px;text-align:center;font-size:9px;font-weight:700;background:'+prioBg+'">'+item.p+'</td>';
    rows+='<td style="border:1px solid #E5E7EB;padding:5px;text-align:center;font-size:9px;font-weight:700;color:'+statusColor+'">'+status+(isDone&&s.doneAt?'<div style="font-size:8px;color:#999">'+s.doneAt+'</div>':"")+'</td>';
    rows+='</tr>';
  });

  // Location progress rows
  var locRows="";
  var locKeys=Object.keys(locs).sort(function(a,b){return(locs[a].done/locs[a].total)-(locs[b].done/locs[b].total)});
  locKeys.forEach(function(loc){
    var l=locs[loc];
    var lpct=l.total>0?Math.round(l.done/l.total*100):0;
    var barColor=lpct===100?"#10B981":lpct>50?"#F59E0B":"#EF4444";
    locRows+='<tr>';
    locRows+='<td style="border:1px solid #E5E7EB;padding:6px;font-size:11px;font-weight:600">'+loc+'</td>';
    locRows+='<td style="border:1px solid #E5E7EB;padding:6px;text-align:center;font-size:11px">'+l.done+'/'+l.total+'</td>';
    locRows+='<td style="border:1px solid #E5E7EB;padding:6px">';
    locRows+='<div style="background:#E5E7EB;border-radius:4px;height:14px;overflow:hidden;position:relative">';
    locRows+='<div style="background:'+barColor+';height:100%;width:'+lpct+'%;border-radius:4px;transition:width .3s"></div>';
    locRows+='<span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;line-height:14px;color:#fff">'+lpct+'%</span>';
    locRows+='</div></td></tr>';
  });

  var html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Informe OCA Residencia</title>';
  html+='<style>';
  html+='@page{size:A4;margin:20mm 15mm}';
  html+='body{font-family:Segoe UI,Arial,sans-serif;margin:0;padding:20px;color:#333;line-height:1.4}';
  html+='@media print{.no-print{display:none!important}table{page-break-inside:auto}tr{page-break-inside:avoid}thead{display:table-header-group}.page-break{page-break-before:always}}';
  html+='h1{color:#0D8A74;font-size:20px;margin:0}h2{color:#0D8A74;font-size:15px;margin:20px 0 10px;border-bottom:2px solid #10A890;padding-bottom:4px}';
  html+='table{width:100%;border-collapse:collapse;margin-bottom:15px}th{background:#10A890;color:#fff;padding:6px;font-size:10px;text-align:left}';
  html+='</style></head><body>';

  // Header
  html+='<div style="border-bottom:3px solid #10A890;padding-bottom:12px;margin-bottom:20px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center">';
  html+='<div><h1>INFORME DE PROGRESO — SUBSANACION OCA ELECTRICA</h1>';
  html+='<div style="font-size:12px;color:#6B7280;margin-top:4px">MI RESIDENCIAL SENIOR — Climacontrol Canarias SL</div></div>';
  html+='<div style="text-align:right;font-size:10px;color:#6B7280">Generado: '+now+'<br>Inspeccion: 26-27/03/2026</div>';
  html+='</div></div>';

  // Summary cards
  html+='<h2>1. Resumen General</h2>';
  html+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">';
  html+=donut(dn,tot,"#10A890","Progreso Total");
  html+=donut(aD,aT,"#EF4444","Prioridad Alta");
  html+=donut(mD,mT,"#F59E0B","Prioridad Media");
  html+=donut(bD,bT,"#10B981","Prioridad Baja");
  html+='</div>';

  // Stats row
  html+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">';
  var cards=[
    {n:tot,l:"Total deficiencias",c:"#374151"},
    {n:dn,l:"Completadas",c:"#10B981"},
    {n:pend,l:"Pendientes",c:"#EF4444"},
    {n:totalPhotos,l:"Fotos evidencia",c:"#6366F1"},
    {n:Object.keys(locs).length,l:"Ubicaciones",c:"#0EA5E9"}
  ];
  cards.forEach(function(c){
    html+='<div style="flex:1;min-width:90px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:10px;text-align:center">';
    html+='<div style="font-size:24px;font-weight:800;color:'+c.c+'">'+c.n+'</div>';
    html+='<div style="font-size:10px;color:#6B7280">'+c.l+'</div></div>';
  });
  html+='</div>';

  // Bar chart by priority
  html+='<h2>2. Avance por Prioridad</h2>';
  html+='<div style="text-align:center;margin-bottom:20px">';
  html+=bar([
    {label:"Alta",total:aT,done:aD,color:"#EF4444"},
    {label:"Media",total:mT,done:mD,color:"#F59E0B"},
    {label:"Baja",total:bT,done:bD,color:"#10B981"}
  ]);
  html+='</div>';

  // Progress by location
  html+='<h2>3. Avance por Ubicacion</h2>';
  html+='<table><thead><tr><th style="width:40%">Ubicacion</th><th style="width:15%;text-align:center">Progreso</th><th style="width:45%">Barra</th></tr></thead>';
  html+='<tbody>'+locRows+'</tbody></table>';

  // Detail table
  html+='<div class="page-break"></div>';
  html+='<h2>4. Detalle de Puntos (con fotos)</h2>';
  html+='<table><thead><tr><th style="width:30px">N</th><th style="width:22%">Ubicacion</th><th>Deficiencia</th><th style="width:45px">Prior.</th><th style="width:80px">Estado</th></tr></thead>';
  html+='<tbody>'+rows+'</tbody></table>';

  // Footer
  html+='<div style="margin-top:20px;border-top:2px solid #10A890;padding-top:10px;font-size:10px;color:#6B7280;text-align:center">';
  html+='CLIMACONTROL CANARIAS SL · CIF B72651086 · Santa Cruz de Tenerife</div>';

  // Print button
  html+='<div class="no-print" style="text-align:center;margin-top:20px">';
  html+='<button onclick="window.print()" style="background:#10A890;color:#fff;border:none;padding:12px 30px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:0 5px">Imprimir / Guardar PDF</button>';
  html+='<button onclick="window.close()" style="background:#6B7280;color:#fff;border:none;padding:12px 30px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:0 5px">Cerrar</button>';
  html+='</div>';

  html+='</body></html>';

  var blob=new Blob([html],{type:"text/html"});
  var url=URL.createObjectURL(blob);
  var win=window.open(url,"_blank");
  if(!win){
    var a=document.createElement("a");a.href=url;
    a.download="Informe_OCA_"+new Date().toISOString().split("T")[0]+".html";
    a.click();
  }
  setTimeout(function(){URL.revokeObjectURL(url)},60000);
}

setInterval(loadFromFirebase, 30000);
